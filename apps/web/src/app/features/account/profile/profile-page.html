<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
  <div class="mb-8 animate-fade-up">
    <h1 class="text-heading text-2xl sm:text-3xl text-slate-900">My Profile</h1>
    <p class="mt-1.5 text-sm text-slate-500">Manage your personal information</p>
  </div>

  @if (loading()) {
    <div class="bg-white rounded-2xl border border-slate-200/60 p-8 space-y-5 animate-fade-in">
      <div class="h-5 bg-slate-200 rounded-full w-1/3 shimmer"></div>
      <div class="h-12 bg-slate-200 rounded-xl shimmer"></div>
      <div class="grid grid-cols-2 gap-4">
        <div class="h-12 bg-slate-200 rounded-xl shimmer"></div>
        <div class="h-12 bg-slate-200 rounded-xl shimmer"></div>
      </div>
      <div class="h-12 bg-slate-200 rounded-xl shimmer"></div>
    </div>
  } @else {
    @if (successMessage()) {
      <div class="mb-6 animate-fade-in">
        <app-alert-banner type="success" [message]="successMessage()" [dismissible]="true" />
      </div>
    }
    @if (error()) {
      <div class="mb-6 animate-fade-in">
        <app-alert-banner type="error" [message]="error()" />
      </div>
    }

    <div class="bg-white rounded-2xl shadow-md shadow-slate-200/50 border border-slate-200/60 overflow-hidden animate-fade-up" style="animation-delay: 60ms;">
      <div class="h-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-500"></div>

      <div class="p-6 sm:p-8">
        <!-- Avatar + role header -->
        <div class="flex items-center gap-4 mb-8 pb-6 border-b border-slate-100">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white text-xl font-black shadow-lg shadow-indigo-600/20 shrink-0">
            {{ firstName.charAt(0) }}{{ lastName.charAt(0) }}
          </div>
          <div>
            <p class="text-lg font-bold text-slate-900">{{ firstName }} {{ lastName }}</p>
            <div class="flex items-center gap-2 mt-1">
              <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-bold uppercase tracking-wider bg-indigo-50 text-indigo-700 border border-indigo-100">
                {{ role }}
              </span>
            </div>
          </div>
        </div>

        <form (ngSubmit)="onSave()" class="space-y-5">
          <!-- Email (read-only) -->
          <div>
            <label for="profile-email" class="block text-sm font-semibold text-slate-700 mb-2">Email address</label>
            <div class="flex items-center gap-2">
              <input
                id="profile-email"
                type="email"
                [value]="email"
                disabled
                class="flex-1 rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 text-sm text-slate-500 cursor-not-allowed"
              />
              <span class="text-[10px] font-semibold text-slate-400 bg-slate-100 rounded-lg px-2 py-1 shrink-0">Read-only</span>
            </div>
          </div>

          <!-- First & Last name -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="profile-firstName" class="block text-sm font-semibold text-slate-700 mb-2">First name</label>
              <input
                id="profile-firstName"
                type="text"
                [(ngModel)]="firstName"
                name="firstName"
                required
                class="block w-full rounded-xl border border-slate-300/80 bg-slate-50/50 px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all"
              />
            </div>
            <div>
              <label for="profile-lastName" class="block text-sm font-semibold text-slate-700 mb-2">Last name</label>
              <input
                id="profile-lastName"
                type="text"
                [(ngModel)]="lastName"
                name="lastName"
                required
                class="block w-full rounded-xl border border-slate-300/80 bg-slate-50/50 px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all"
              />
            </div>
          </div>

          <!-- Phone -->
          <div>
            <label for="profile-phone" class="block text-sm font-semibold text-slate-700 mb-2">Phone number</label>
            <input
              id="profile-phone"
              type="tel"
              [(ngModel)]="phoneNumber"
              name="phoneNumber"
              required
              class="block w-full rounded-xl border border-slate-300/80 bg-slate-50/50 px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all"
            />
          </div>

          <!-- Save button -->
          <div class="pt-3">
            <button
              type="submit"
              [disabled]="saving()"
              class="btn-primary rounded-xl px-6 py-3 text-sm shadow-lg shadow-indigo-600/20 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              @if (saving()) {
                <span class="spinner w-4 h-4"></span>
                Saving...
              } @else {
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
                Save Changes
              }
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Back link -->
    <div class="mt-6 text-center">
      <a routerLink="/" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors">
        ← Back to Home
      </a>
    </div>
  }
</div>
