<div
  class="inline-flex items-center gap-1 rounded-xl border border-slate-200 bg-white/80 p-1 shadow-sm"
  [attr.aria-label]="'language.label' | t"
>
  <button
    type="button"
    (click)="language.setLanguage('th')"
    [class]="
      language.current() === 'th'
        ? 'rounded-lg bg-slate-900 px-2.5 py-1 text-xs font-semibold text-white transition-colors'
        : 'rounded-lg px-2.5 py-1 text-xs font-semibold text-slate-500 hover:bg-slate-100 transition-colors cursor-pointer'
    "
  >
    {{ 'language.th' | t }}
  </button>
  <button
    type="button"
    (click)="language.setLanguage('en')"
    [class]="
      language.current() === 'en'
        ? 'rounded-lg bg-slate-900 px-2.5 py-1 text-xs font-semibold text-white transition-colors'
        : 'rounded-lg px-2.5 py-1 text-xs font-semibold text-slate-500 hover:bg-slate-100 transition-colors cursor-pointer'
    "
  >
    {{ 'language.en' | t }}
  </button>
</div>
