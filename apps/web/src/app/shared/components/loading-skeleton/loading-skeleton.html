@switch (variant()) {
  @case ('card') {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 stagger-children">
      @for (_ of items(); track $index) {
        <div class="skeleton-item bg-white rounded-2xl shadow-md shadow-slate-200/30 border border-slate-200/60 overflow-hidden">
          <div class="aspect-square shimmer"></div>
          <div class="p-4 space-y-3">
            <div class="h-3 shimmer rounded-full w-1/3"></div>
            <div class="h-4 shimmer rounded-full w-2/3"></div>
            <div class="h-3 shimmer rounded-full w-1/4"></div>
            <div class="h-5 shimmer rounded-full w-1/2 mt-2"></div>
          </div>
        </div>
      }
    </div>
  }

  @case ('table-row') {
    <div class="space-y-0 stagger-children">
      @for (_ of items(); track $index) {
        <div class="skeleton-item flex items-center gap-4 px-5 py-3.5 border-b border-slate-100 last:border-b-0">
          <div class="h-4 shimmer rounded-full w-24"></div>
          <div class="h-4 shimmer rounded-full w-32"></div>
          <div class="h-4 shimmer rounded-full w-20"></div>
          <div class="flex-1"></div>
          <div class="h-4 shimmer rounded-full w-16"></div>
        </div>
      }
    </div>
  }

  @case ('detail') {
    <div class="space-y-5 stagger-children">
      <div class="flex items-center gap-4">
        <div class="h-8 shimmer rounded-lg w-48"></div>
        <div class="h-6 shimmer rounded-full w-24"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-md shadow-slate-200/30 border border-slate-200/60 p-6 space-y-4">
        <div class="h-4 shimmer rounded-full w-1/3"></div>
        <div class="h-4 shimmer rounded-full w-full"></div>
        <div class="h-4 shimmer rounded-full w-2/3"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-md shadow-slate-200/30 border border-slate-200/60 p-6 space-y-4">
        <div class="h-4 shimmer rounded-full w-1/4"></div>
        <div class="h-32 shimmer rounded-xl"></div>
      </div>
    </div>
  }
}
