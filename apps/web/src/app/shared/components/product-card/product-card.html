<a
  [routerLink]="['/products', product().slug]"
  class="group block bg-white rounded-2xl border border-slate-200/60 overflow-hidden shadow-sm hover:shadow-xl hover:shadow-indigo-100/40 hover:border-indigo-200/50 hover:-translate-y-1 transition-all duration-300"
>
  <!-- Image -->
  <div class="aspect-[4/3] bg-slate-100 overflow-hidden relative">
    <img
      [src]="product().image ?? '/images/no-image.svg'"
      [alt]="product().name"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out"
    />

    <!-- Out of stock overlay -->
    @if (product().stock === 0) {
      <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/40 to-black/20 flex items-center justify-center">
        <span class="text-white font-bold text-xs bg-red-600/90 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-lg">Out of Stock</span>
      </div>
    }

    <!-- Top badges -->
    <div class="absolute top-3 left-3 right-3 flex items-start justify-between">
      <!-- Brand badge -->
      <span class="inline-flex items-center bg-white/90 backdrop-blur-sm text-slate-800 text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-lg shadow-sm">
        {{ product().brand.name }}
      </span>

      <!-- Warranty badge -->
      @if (product().warrantyMonths) {
        <span class="inline-flex items-center gap-1 bg-emerald-500/90 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-sm">
          <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" /></svg>
          {{ product().warrantyMonths }}mo
        </span>
      }
    </div>

    <!-- Hover arrow indicator -->
    <div class="absolute bottom-3 right-3 w-8 h-8 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300">
      <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
    </div>
  </div>

  <!-- Content -->
  <div class="p-4">
    <div class="flex items-center gap-2 mb-1.5">
      <span class="text-[10px] text-slate-400 font-medium">{{ product().category.name }}</span>
    </div>

    <h3 class="text-sm font-semibold text-slate-900 line-clamp-2 min-h-10 leading-snug group-hover:text-indigo-600 transition-colors duration-200">
      {{ product().name }}
    </h3>

    <!-- Price and stock row -->
    <div class="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between">
      <p class="text-lg font-extrabold text-slate-900">
        {{ product().price | thaiBaht }}
      </p>
      @if (product().stock > 0) {
        <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full">
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
          In stock
        </span>
      } @else {
        <span class="text-[11px] font-semibold text-red-500">Sold out</span>
      }
    </div>
  </div>
</a>
